<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScreenPal 屏幕学伴 — 你的图书馆学习搭子</title>
<style>
  :root {
    --bg: #1a1814;
    --surface: #231f1a;
    --surface2: #2d2822;
    --border: #3a342c;
    --text: #e8e4db;
    --text2: #9d9689;
    --amber: #e8a840;
    --green: #7a9f7a;
    --red: #c47a6a;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    grid-template-rows: 48px 1fr;
    height: 100vh;
    gap: 1px;
    background: var(--border);
    transition: 0.3s;
  }

  /* ─── Mini mode ─── */
  .app.mini {
    grid-template-columns: 1fr;
    grid-template-rows: 40px 1fr;
    max-width: 360px;
    margin-left: auto;
  }
  .app.mini .screen-panel { display: none; }
  .app.mini .notes-panel { display: none; }
  .app.mini .mini-hidden { display: none !important; }
  .app.mini .header { padding: 0 10px; }
  .app.mini .header .logo { font-size: 14px; }
  .app.mini .header .logo span { display: none; }
  .app.mini .chat-messages { font-size: 13px; padding: 8px; }
  .app.mini .chat-bubble { font-size: 12px; max-width: 95%; padding: 8px 10px; }
  .app.mini .voice-bar { padding: 8px 10px; gap: 6px; }
  .app.mini .mini-show { display: flex !important; }
  .app.mini .mic-btn { width: 36px; height: 36px; font-size: 16px; }

  .mini-show { display: none !important; }

  /* ─── Header ─── */
  .header {
    grid-column: 1 / -1;
    background: var(--surface);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .logo { font-size: 16px; font-weight: 700; color: var(--amber); }
  .logo span { color: var(--text2); font-weight: 400; font-size: 12px; }
  .header .spacer { flex: 1; }
  .header select, .header button {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 4px 10px; border-radius: 5px;
    font-size: 11px; cursor: pointer; transition: 0.15s; white-space: nowrap;
  }
  .header select:hover, .header button:hover { border-color: var(--amber); }
  .header .btn-amber { background: var(--amber); border-color: var(--amber); color: #1a1814; font-weight: 600; }
  .header .btn-mini { font-size: 14px; padding: 2px 8px; line-height: 1; }

  /* ─── Panels ─── */
  .panel {
    background: var(--surface);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .panel-header {
    padding: 8px 12px; font-size: 10px; font-weight: 600;
    color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  .panel-body { flex: 1; overflow-y: auto; padding: 8px; }

  /* ─── Left: Screen Panel ─── */
  .screen-preview {
    background: var(--bg); border-radius: var(--radius);
    min-height: 140px; display: flex; align-items: center;
    justify-content: center; margin-bottom: 8px; overflow: hidden;
  }
  .screen-preview img { max-width: 100%; max-height: 220px; object-fit: contain; }
  .screen-placeholder { color: var(--text2); font-size: 12px; text-align: center; line-height: 1.5; }
  .screen-placeholder .icon { font-size: 32px; margin-bottom: 4px; opacity: 0.5; }

  .btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 11px;
    cursor: pointer; transition: 0.15s; }
  .btn:hover { border-color: var(--amber); }
  .btn.primary { background: var(--amber); border-color: var(--amber); color: #1a1814; font-weight: 600; }
  .btn.small { padding: 3px 8px; font-size: 10px; }
  .btn.active-btn { border-color: var(--green); color: var(--green); }

  .status-line { display: flex; align-items: center; gap: 6px; font-size: 10px;
    margin-top: 6px; padding: 5px 8px; border-radius: 6px; background: var(--surface2); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.ready { background: var(--text2); }
  .status-dot.listening { background: var(--amber); animation: pulse 1s infinite; }
  .status-dot.speaking { background: var(--green); }
  .status-dot.thinking { background: var(--amber); animation: pulse 0.6s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .region-info {
    font-size: 10px; color: var(--amber); margin-top: 4px;
    padding: 4px 8px; border-radius: 4px; background: rgba(232,168,64,0.1);
    display: flex; align-items: center; gap: 4px;
  }

  /* ─── Center: Chat ─── */
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .chat-bubble {
    max-width: 88%; padding: 8px 12px; border-radius: 12px;
    font-size: 13px; line-height: 1.5;
    animation: fadeIn 0.25s;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } }
  .chat-bubble.ai {
    align-self: flex-start; background: var(--surface2);
    border-bottom-left-radius: 3px; white-space: pre-wrap;
  }
  .chat-bubble.user {
    align-self: flex-end; background: #3d3226;
    border-bottom-right-radius: 3px;
  }
  .chat-bubble.system {
    align-self: center; background: transparent;
    color: var(--text2); font-size: 10px; font-style: italic;
  }
  .chat-bubble .label { font-size: 9px; opacity: 0.5; margin-bottom: 2px; }

  /* ─── Voice Bar ─── */
  .voice-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-top: 1px solid var(--border);
  }
  .voice-bar input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 16px;
    font-size: 12px; outline: none; transition: 0.15s;
  }
  .voice-bar input:focus { border-color: var(--amber); }
  .voice-bar input::placeholder { color: var(--text2); }

  .mic-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: 0.2s; flex-shrink: 0;
  }
  .mic-btn:hover { border-color: var(--amber); }
  .mic-btn.active {
    background: var(--amber); border-color: var(--amber);
    color: #1a1814; box-shadow: 0 0 18px rgba(232,168,64,0.4);
    animation: micPulse 1.5s infinite;
  }
  @keyframes micPulse {
    0%,100% { box-shadow: 0 0 6px rgba(232,168,64,0.3); }
    50% { box-shadow: 0 0 20px rgba(232,168,64,0.6); }
  }

  /* ─── Right: Notes ─── */
  .note-card {
    background: var(--surface2); border-radius: var(--radius);
    padding: 8px 10px; margin-bottom: 5px; cursor: pointer;
    transition: 0.15s; border: 1px solid transparent;
  }
  .note-card:hover { border-color: var(--border); }
  .note-card .note-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
  .note-card .note-meta { font-size: 9px; color: var(--text2); }

  /* ─── Modal ─── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: var(--surface); border-radius: var(--radius);
    padding: 20px; max-width: 460px; width: 90%;
    max-height: 80vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .modal h3 { margin-bottom: 12px; font-size: 14px; color: var(--amber); }
  .modal label { display: block; font-size: 10px; color: var(--text2); margin: 8px 0 2px; }
  .modal input, .modal select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px; border-radius: 5px; font-size: 12px; outline: none;
  }
  .modal input:focus, .modal select:focus { border-color: var(--amber); }
  .modal .btn-row { margin-top: 14px; display: flex; gap: 6px; justify-content: flex-end; }
  .hidden { display: none !important; }

  .note-detail { white-space: pre-wrap; line-height: 1.6; font-size: 13px; max-height: 50vh; overflow-y: auto; }
  .note-detail h2, .note-detail h3 { color: var(--amber); margin-top: 8px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="app" id="appContainer">
  <!-- Header -->
  <header class="header">
    <div class="logo">ScreenPal<span> — 图书馆学习搭子</span></div>
    <select id="personalitySelect" onchange="changePersonality()" class="mini-hidden">
      <option value="study_buddy">图书馆死党</option>
      <option value="serious_teacher">辅导老师</option>
      <option value="encouraging_coach">耐心教练</option>
      <option value="socratic_guide">思辨搭档</option>
    </select>
    <div class="spacer mini-hidden"></div>
    <button onclick="launchWidget()" class="btn small" title="打开浮动组件窗口">🖥️ 组件</button>
    <button onclick="toggleMini()" class="btn-mini" id="miniBtn" title="切换迷你窗口">📌</button>
    <span id="voiceStatus" class="mini-hidden" style="font-size:10px;color:var(--text2);">语音就绪</span>
    <button onclick="resetSession()" class="btn small mini-hidden">新会话</button>
    <button onclick="showSettings()" class="btn small mini-hidden">设置</button>
  </header>

  <!-- Left: Screen Panel -->
  <div class="panel screen-panel">
    <div class="panel-header">屏幕课件</div>
    <div class="panel-body">
      <div class="screen-preview" id="screenPreview">
        <div class="screen-placeholder">
          <div class="icon">📖</div>
          <div>捕获屏幕课件<br>开始一起学习</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn primary" onclick="captureScreen()" id="captureBtn" style="flex:1;">捕获屏幕</button>
        <button class="btn" onclick="selectRegion()" title="拖拽框选课件区域">✂️</button>
      </div>
      <div id="regionInfo" class="region-info hidden">
        📐 已框选区域 <a href="#" onclick="clearRegion();return false;" style="color:var(--red);margin-left:4px;">×清除</a>
      </div>
      <div style="display:flex;gap:4px;margin-top:4px;">
        <button class="btn small" onclick="generateNote()" style="flex:1;">生成笔记</button>
        <button class="btn small" onclick="exportNotes()" style="flex:1;">导出手册</button>
      </div>
      <div class="status-line">
        <span class="status-dot ready" id="statusDot"></span>
        <span id="statusText">就绪</span>
      </div>
    </div>
  </div>

  <!-- Center: Chat -->
  <div class="panel">
    <div class="panel-header">
      对话 <span style="font-weight:400;font-size:9px;">— 像朋友一样聊天</span>
      <span class="spacer" style="flex:1;"></span>
      <button class="btn small mini-hidden" onclick="captureScreen()">捕获</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-bubble system">嘿！我是小伴，你的图书馆学习搭子。<br>点「捕获屏幕」开始一起啃课件~<br>点 📌 可切换迷你窗口</div>
    </div>
    <div class="voice-bar">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="点击说话 / 按住空格键">🎤</button>
      <label id="hfLabel" class="btn small" style="cursor:pointer;display:flex;align-items:center;gap:3px;font-size:10px;">
        <input type="checkbox" id="hfCheckbox" onchange="toggleHandsFree()" style="width:auto;"> 免提
      </label>
      <input type="text" id="chatInput" placeholder="打字也行..."
             onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="btn primary" onclick="sendMessage()" style="flex-shrink:0;">发送</button>
    </div>
  </div>

  <!-- Right: Notes Panel -->
  <div class="panel notes-panel">
    <div class="panel-header">复习笔记 <span style="font-weight:400;font-size:9px;" id="noteCount">0条</span></div>
    <div class="panel-body" id="notesList">
      <div style="color:var(--text2);font-size:11px;text-align:center;margin-top:30px;">
        学习中检测到的疑难点<br>会自动整理成笔记
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay hidden" id="settingsModal">
  <div class="modal">
    <h3>设置</h3>
    <label>AI 服务</label>
    <select id="settingProvider" onchange="onProviderChange()">
      <option value="zhipu">智谱 GLM-4V (免费/国内)</option>
      <option value="gemini">Google Gemini (免费/VPN)</option>
      <option value="claude">Anthropic Claude (付费)</option>
    </select>

    <div id="zhipuSettings">
      <label>智谱 API Key</label>
      <input type="password" id="settingZhipuKey" placeholder="从 open.bigmodel.cn 获取">
      <label>模型</label>
      <select id="settingZhipuModel">
        <option value="glm-4v">GLM-4V (多模态)</option>
        <option value="glm-4v-plus">GLM-4V-Plus</option>
        <option value="glm-4v-flash">GLM-4V-Flash (快)</option>
      </select>
    </div>

    <div id="geminiSettings" class="hidden">
      <label>Google API Key</label>
      <input type="password" id="settingGoogleKey" placeholder="AIza... 从 aistudio.google.com 获取">
      <label>模型</label>
      <select id="settingGeminiModel">
        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
      </select>
    </div>

    <div id="claudeSettings" class="hidden">
      <label>Anthropic API Key</label>
      <input type="password" id="settingAnthropicKey" placeholder="sk-ant-...">
      <label>模型</label>
      <select id="settingClaudeModel">
        <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
        <option value="claude-opus-4-7">Claude Opus 4.7</option>
      </select>
    </div>

    <div class="btn-row">
      <button class="btn" onclick="hideSettings()">取消</button>
      <button class="btn primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- Note Detail Modal -->
<div class="modal-overlay hidden" id="noteModal">
  <div class="modal">
    <h3 id="noteModalTitle">笔记详情</h3>
    <div class="note-detail" id="noteModalContent"></div>
    <div class="btn-row">
      <button class="btn small" id="noteDeleteBtn" onclick="deleteNote()" style="border-color:var(--red);color:var(--red);">删除</button>
      <div style="flex:1;"></div>
      <button class="btn" onclick="hideNoteDetail()">关闭</button>
    </div>
  </div>
</div>

<script>
// ─── Widget Launcher ────────────────────────────────────────────────

async function launchWidget() {
  try {
    const r = await fetch("/api/widget/launch", {method: "POST"});
    const d = await r.json();
    if (d.success) {
      addChatMessage("system", "浮动组件已启动！把它拖到课件旁边吧~");
    } else {
      alert("启动失败: " + d.error);
    }
  } catch(e) { alert("启动失败: " + e.message); }
}

// ─── Mini mode ──────────────────────────────────────────────────────

let miniMode = false;

function toggleMini() {
  miniMode = !miniMode;
  const app = document.getElementById("appContainer");
  const btn = document.getElementById("miniBtn");
  if (miniMode) {
    app.classList.add("mini");
    btn.textContent = "📖";
    btn.title = "切换完整窗口";
    addChatMessage("system", "已切换迷你窗口 — 放在侧边听课吧~");
  } else {
    app.classList.remove("mini");
    btn.textContent = "📌";
    btn.title = "切换迷你窗口";
  }
}

// ─── Region Selection ───────────────────────────────────────────────

async function selectRegion() {
  try {
    const r = await fetch("/api/region/select", {method: "POST"});
    const d = await r.json();
    if (d.success) {
      addChatMessage("system", "在屏幕上拖拽框选课件区域，松手确认");
      // Poll for result
      let tries = 0;
      const poll = setInterval(async () => {
        tries++;
        const rr = await fetch("/api/region");
        const dd = await rr.json();
        if (dd.active) {
          clearInterval(poll);
          document.getElementById("regionInfo").classList.remove("hidden");
          document.getElementById("regionInfo").innerHTML =
            `📐 已框选区域 (${dd.region.w}×${dd.region.h}) <a href="#" onclick="clearRegion();return false;" style="color:var(--red);margin-left:4px;">×清除</a>`;
          addChatMessage("system", `区域已选定: ${dd.region.w}×${dd.region.h}`);
        } else if (tries > 60) {
          clearInterval(poll);
        }
      }, 500);
    }
  } catch(e) { alert("区域选择失败: " + e.message); }
}

async function clearRegion() {
  await fetch("/api/region/clear", {method: "POST"});
  document.getElementById("regionInfo").classList.add("hidden");
  addChatMessage("system", "已恢复全屏捕获");
}

async function loadRegion() {
  try {
    const r = await fetch("/api/region");
    const d = await r.json();
    if (d.active && d.region) {
      document.getElementById("regionInfo").classList.remove("hidden");
      document.getElementById("regionInfo").innerHTML =
        `📐 已框选区域 (${d.region.w}×${d.region.h}) <a href="#" onclick="clearRegion();return false;" style="color:var(--red);margin-left:4px;">×清除</a>`;
    }
  } catch(e) {}
}

// ─── Voice (Web Speech API) ─────────────────────────────────────────

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;
let handsFreeMode = false;
let voiceEnabled = true;

function initSpeech() {
  if (!SpeechRecognition) {
    document.getElementById("voiceStatus").textContent = "语音: 不支持";
    return;
  }
  recognition = new SpeechRecognition();
  recognition.continuous = true;  // Keep listening
  recognition.interimResults = true;
  recognition.lang = 'zh-CN';

  recognition.onresult = (event) => {
    let transcript = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    document.getElementById("chatInput").value = transcript;

    if (event.results[event.results.length - 1].isFinal) {
      const finalText = transcript.trim();
      if (finalText) {
        if (handsFreeMode) {
          // Auto-send and keep listening
          document.getElementById("chatInput").value = "";
          sendMessageDirect(finalText);
          // recognition.continuous=true keeps it running
        } else {
          stopListening();
          setTimeout(() => sendMessage(), 300);
        }
      }
    }
  };

  recognition.onerror = (event) => {
    if (handsFreeMode && (event.error === 'no-speech' || event.error === 'aborted')) {
      // Just restart silently
      try { recognition.start(); } catch(e) {}
      return;
    }
    if (handsFreeMode) {
      try { setTimeout(() => recognition.start(), 500); } catch(e) {}
      return;
    }
    stopListening();
    if (event.error === 'not-allowed') {
      setStatus("麦克风无权限", "ready");
    }
  };

  recognition.onend = () => {
    if (handsFreeMode) {
      // Always restart in hands-free mode
      setTimeout(() => {
        try { recognition.start(); } catch(e) {}
      }, 300);
      return;
    }
    if (isListening) {
      try { recognition.start(); } catch(e) {}
    } else {
      setStatus("就绪", "ready");
    }
  };
}

function toggleHandsFree() {
  handsFreeMode = document.getElementById("hfCheckbox").checked;
  const label = document.getElementById("hfLabel");

  if (handsFreeMode) {
    label.style.borderColor = "var(--amber)";
    label.style.color = "var(--amber)";
    setStatus("免提监听中... (直接说话)", "listening");
    document.getElementById("voiceStatus").textContent = "免提: 开";
    if (!isListening) startListeningContinuous();
    addChatMessage("system", "免提模式开启 — 直接说话，我一直在听~");
  } else {
    label.style.borderColor = "";
    label.style.color = "";
    document.getElementById("voiceStatus").textContent = "语音: 就绪";
    stopListening();
    setStatus("就绪", "ready");
  }
}

function startListeningContinuous() {
  if (!recognition) return;
  isListening = true;
  const btn = document.getElementById("micBtn");
  btn.classList.add("active"); btn.textContent = "🎤";
  try { recognition.start(); } catch(e) {}
}

// Direct send without reading from input (for hands-free)
async function sendMessageDirect(message) {
  if (!message) return;
  addChatMessage("user", message);
  setStatus("思考中...", "thinking");

  try {
    const r = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message, voice_mode: true})
    });
    const d = await r.json();
    if (d.success) {
      addChatMessage("ai", d.reply);
      setStatus(handsFreeMode ? "免提监听中..." : "就绪", handsFreeMode ? "listening" : "ready");
      speakText(d.reply);
      if (d.difficulty_flagged) {
        addChatMessage("system", "注意到你在这个点卡住了——可以生成笔记强化");
      }
    } else {
      setStatus("就绪", "ready");
    }
  } catch(e) {
    setStatus("就绪", "ready");
  }
}

function speakText(text) {
  if (!voiceEnabled) return;
  const synth = window.speechSynthesis;
  synth.cancel();
  let cleanText = text.replace(/\*\*(.+?)\*\*/g, "$1").replace(/`(.+?)`/g, "$1").replace(/[#\-\*]/g, "").replace(/\n+/g, "。");
  const sentences = cleanText.split(/[。！？\.!\?]/).filter(s => s.trim());
  sentences.forEach((sentence, i) => {
    if (!sentence.trim()) return;
    const utter = new SpeechSynthesisUtterance(sentence.trim());
    utter.lang = 'zh-CN'; utter.rate = 1.05; utter.pitch = 1.0; utter.volume = 0.9;
    if (i === 0) utter.onstart = () => setStatus("小伴说话中...", "speaking");
    if (i === sentences.length - 1) utter.onend = () => setStatus("就绪", "ready");
    synth.speak(utter);
  });
}

function toggleMic() {
  if (!recognition) { alert("浏览器不支持语音识别，请用 Chrome/Edge"); return; }
  isListening ? stopListening() : startListening();
}

function startListening() {
  if (!recognition) return;
  isListening = true;
  const btn = document.getElementById("micBtn");
  btn.classList.add("active"); btn.textContent = "🎤";
  document.getElementById("chatInput").placeholder = "正在听你说话...";
  setStatus("聆听中...", "listening");
  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  isListening = false;
  const btn = document.getElementById("micBtn");
  btn.classList.remove("active"); btn.textContent = "🎤";
  document.getElementById("chatInput").placeholder = "打字也行...";
  try { recognition.stop(); } catch(e) {}
}

function setStatus(text, state) {
  document.getElementById("statusText").textContent = text;
  document.getElementById("statusDot").className = "status-dot " + state;
}

// ─── Screen Capture ─────────────────────────────────────────────────

let currentImageB64 = null;

async function captureScreen() {
  const btn = document.getElementById("captureBtn");
  btn.disabled = true; btn.textContent = "捕获中...";
  setStatus("分析中...", "thinking");

  try {
    const r = await fetch("/api/capture", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({monitor: 1})
    });
    const d = await r.json();

    if (!d.success) {
      if (d.error && d.error.includes("API Key")) {
        alert("请先在设置中配置 API Key");
        showSettings();
      } else {
        alert("错误: " + d.error);
      }
      setStatus("就绪", "ready");
      return;
    }

    currentImageB64 = d.image_base64;
    showScreenPreview(d.image_base64);
    addChatMessage("ai", d.analysis);
    setStatus("就绪", "ready");
    speakText(d.analysis);

  } catch(e) {
    setStatus("连接失败", "ready");
    alert("无法连接服务器: " + e.message);
  } finally {
    btn.disabled = false; btn.textContent = "捕获屏幕";
  }
}

function showScreenPreview(b64) {
  document.getElementById("screenPreview").innerHTML =
    `<img src="data:image/jpeg;base64,${b64}" alt="Screen">`;
}

// ─── Chat ────────────────────────────────────────────────────────────

async function sendMessage() {
  const input = document.getElementById("chatInput");
  const message = input.value.trim();
  if (!message) return;

  input.value = "";
  input.disabled = true;
  addChatMessage("user", message);
  setStatus("思考中...", "thinking");

  try {
    const r = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message, voice_mode: true})
    });
    const d = await r.json();

    if (!d.success) {
      addChatMessage("system", "出错: " + d.error);
      setStatus("就绪", "ready");
    } else {
      addChatMessage("ai", d.reply);
      setStatus("就绪", "ready");
      speakText(d.reply);
      if (d.difficulty_flagged) {
        addChatMessage("system", "注意到你在这个点卡住了——可以生成笔记强化");
      }
    }
  } catch(e) {
    addChatMessage("system", "发送失败: " + e.message);
    setStatus("就绪", "ready");
  } finally {
    input.disabled = false;
    input.focus();
  }
}

function addChatMessage(role, content) {
  const container = document.getElementById("chatMessages");
  const div = document.createElement("div");
  div.className = `chat-bubble ${role}`;
  if (role === "ai") div.innerHTML = `<div class="label">小伴</div>${escapeHtml(content)}`;
  else if (role === "user") div.innerHTML = `<div class="label">你</div>${escapeHtml(content)}`;
  else div.textContent = content;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/\n/g, "<br>")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/`(.+?)`/g, "<code>$1</code>");
}

// ─── Notes ───────────────────────────────────────────────────────────

async function generateNote() {
  try {
    const r = await fetch("/api/notes/generate", {
      method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({})
    });
    const d = await r.json();
    if (d.success) {
      addChatMessage("system", "复习笔记已生成");
      loadNotes();
      showNoteDetail(d.note.filename, d.note.content);
    } else { alert("生成失败: " + d.error); }
  } catch(e) { alert("生成失败: " + e.message); }
}

async function loadNotes() {
  try {
    const r = await fetch("/api/notes");
    const d = await r.json();
    const list = document.getElementById("notesList");
    const count = document.getElementById("noteCount");
    if (d.notes && d.notes.length > 0) {
      count.textContent = d.notes.length + "条";
      list.innerHTML = d.notes.map(n => `
        <div class="note-card" onclick="openNote('${n.filename}')">
          <div class="note-title">${n.filename}</div>
          <div class="note-meta">${n.created}</div>
        </div>
      `).join("");
    } else {
      count.textContent = "0条";
      list.innerHTML = '<div style="color:var(--text2);font-size:11px;text-align:center;margin-top:30px;">学习中检测到的疑难点<br>会自动整理成笔记</div>';
    }
  } catch(e) {}
}

async function openNote(filename) {
  try {
    const r = await fetch(`/api/notes/${filename}`);
    const d = await r.json();
    if (d.success) showNoteDetail(filename, d.content);
  } catch(e) {}
}

function showNoteDetail(filename, content) {
  currentNoteFile = filename;
  document.getElementById("noteModalTitle").textContent = filename;
  document.getElementById("noteModalContent").innerHTML = mdToHtml(content);
  document.getElementById("noteModal").classList.remove("hidden");
}

function hideNoteDetail() {
  document.getElementById("noteModal").classList.add("hidden");
  currentNoteFile = null;
}

async function deleteNote() {
  if (!currentNoteFile || !confirm("确定删除？")) return;
  await fetch(`/api/notes/${currentNoteFile}`, {method: "DELETE"});
  hideNoteDetail(); loadNotes();
}

async function exportNotes() {
  try {
    const r = await fetch("/api/notes/export/all", {method: "POST"});
    const d = await r.json();
    if (d.success) {
      addChatMessage("system", "复习手册已导出");
      showNoteDetail("复习手册", d.content);
    } else { alert(d.error); }
  } catch(e) { alert("导出失败: " + e.message); }
}

let currentNoteFile = null;

function mdToHtml(md) {
  return md
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/^### (.+)$/gm, "<h3>$1</h3>")
    .replace(/^## (.+)$/gm, "<h2>$1</h2>")
    .replace(/^# (.+)$/gm, "<h1>$1</h1>")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/^- (.+)$/gm, "<li>$1</li>")
    .replace(/\n/g, "<br>");
}

// ─── Settings ───────────────────────────────────────────────────────

function onProviderChange() {
  const prov = document.getElementById("settingProvider").value;
  document.getElementById("zhipuSettings").classList.toggle("hidden", prov !== "zhipu");
  document.getElementById("geminiSettings").classList.toggle("hidden", prov !== "gemini");
  document.getElementById("claudeSettings").classList.toggle("hidden", prov !== "claude");
}

function showSettings() {
  document.getElementById("settingsModal").classList.remove("hidden");
  fetch("/api/settings").then(r => r.json()).then(d => {
    if (d.success) {
      const s = d.settings;
      document.getElementById("settingProvider").value = s.provider || "zhipu";
      document.getElementById("settingZhipuKey").value = "";
      document.getElementById("settingGoogleKey").value = "";
      document.getElementById("settingAnthropicKey").value = "";
      document.getElementById("settingZhipuModel").value = s.zhipu_model || "glm-4v";
      document.getElementById("settingGeminiModel").value = s.gemini_model || "gemini-2.0-flash";
      document.getElementById("settingClaudeModel").value = s.claude_model || "claude-sonnet-4-6";
      onProviderChange();
    }
  });
}

function hideSettings() { document.getElementById("settingsModal").classList.add("hidden"); }

async function saveSettings() {
  const prov = document.getElementById("settingProvider").value;
  const zhipuKey = document.getElementById("settingZhipuKey").value.trim();
  const googleKey = document.getElementById("settingGoogleKey").value.trim();
  const anthropicKey = document.getElementById("settingAnthropicKey").value.trim();
  const zhipuModel = document.getElementById("settingZhipuModel").value;
  const geminiModel = document.getElementById("settingGeminiModel").value;
  const claudeModel = document.getElementById("settingClaudeModel").value;

  const body = {provider: prov, zhipu_model: zhipuModel, gemini_model: geminiModel, claude_model: claudeModel};
  if (zhipuKey) body.zhipu_key = zhipuKey;
  if (googleKey) body.google_key = googleKey;
  if (anthropicKey) body.anthropic_key = anthropicKey;

  try {
    const r = await fetch("/api/settings", {
      method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.success) {
      hideSettings();
      const names = {zhipu: "智谱 GLM-4V", gemini: "Gemini", claude: "Claude"};
      addChatMessage("system", "设置已保存~ 当前: " + (names[prov] || prov));
    } else { alert("保存失败: " + d.error); }
  } catch(e) { alert("保存失败: " + e.message); }
}

// ─── Personality ────────────────────────────────────────────────────

async function changePersonality() {
  const val = document.getElementById("personalitySelect").value;
  await fetch("/api/settings", {
    method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({personality: val})
  });
}

// ─── Session ────────────────────────────────────────────────────────

async function resetSession() {
  if (!confirm("确定开始新会话？")) return;
  await fetch("/api/reset", {method: "POST"});
  document.getElementById("chatMessages").innerHTML =
    '<div class="chat-bubble system">好，重新开始！</div>';
  document.getElementById("screenPreview").innerHTML =
    '<div class="screen-placeholder"><div class="icon">📖</div><div>捕获屏幕课件<br>开始一起学习</div></div>';
  setStatus("就绪", "ready");
  currentImageB64 = null;
  window.speechSynthesis.cancel();
}

// ─── Keyboard ───────────────────────────────────────────────────────

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { hideSettings(); hideNoteDetail(); if (isListening) stopListening(); }
  if (e.code === "Space" && !isListening && document.activeElement === document.body) {
    e.preventDefault();
    startListening();
    document.addEventListener("keyup", function onUp(ev) {
      if (ev.code === "Space") { stopListening(); document.removeEventListener("keyup", onUp); }
    }, {once: true});
  }
});

// ─── Init ───────────────────────────────────────────────────────────

function init() {
  initSpeech();
  loadNotes();
  loadRegion();
  fetch("/api/personalities").then(r => r.json()).then(d => {
    if (d.success) document.getElementById("personalitySelect").value = d.current;
  }).catch(() => {});
  document.getElementById("chatInput").focus();
}

init();
</script>
